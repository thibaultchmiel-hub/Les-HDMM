<!DOCTYPE html>
<html>
<head>
<title>Compteur HDMM</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin-top:150px;
}

#argent{
font-size:70px;
margin-bottom:40px;
color:#22c55e;
transition: transform 0.2s;
}

.bounce{
transform: scale(1.3);
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
}

.reset{
background:#ef4444;
}
</style>

</head>

<body>

<h1>💰 Compteur HDMM</h1>

<div id="argent">0 €</div>

<button onclick="ajouter(1)">+1€</button>
<button onclick="ajouter(10)">+10€</button>
<button onclick="ajouter(100)">+100€</button>

<br>

<button class="reset" onclick="reset()">Reset</button>

<script>

let argent = localStorage.getItem("argent") || 0;
let compteur = document.getElementById("argent");

compteur.innerText = argent + " €";

function ajouter(valeur){
argent = Number(argent) + valeur;
localStorage.setItem("argent", argent);
compteur.innerText = argent + " €";

compteur.classList.add("bounce");

setTimeout(() => {
compteur.classList.remove("bounce");
},200);
}

function reset(){
argent = 0;
localStorage.setItem("argent", argent);
compteur.innerText = argent + " €";
}

</script>

</body>
</html>
